spring.application.name=backend

spring.datasource.url=jdbc:mysql://localhost:3306/${DB_NAME}?serverTimezone=UTC&createDatabaseIfNotExist=true
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.sql.init.mode=always

spring.jpa.defer-datasource-initialization=true
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

jwt.secret=${JWT_SECRET}
jwt.refresh-expiration-ms=86400000

initial.admin.username=${INITIAL_ADMIN_USERNAME}
initial.admin.password=${INITIAL_ADMIN_PASSWORD}
initial.admin.email=${INITIAL_ADMIN_EMAIL}


#spring.jackson.serialization.write-dates-as-timestamps=false